{{- if not .Values.aws.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "infrawatch.fullname" . }}
  labels:
    {{- include "infrawatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  POWER_AWS_ACCESS_KEY_ID: {{ required "aws.powerAccessKeyId is required" .Values.aws.powerAccessKeyId | quote }}
  POWER_AWS_SECRET_ACCESS_KEY: {{ required "aws.powerSecretAccessKey is required" .Values.aws.powerSecretAccessKey | quote }}
  POWER_AWS_REGION: {{ .Values.aws.region | quote }}
  BASE_ROLE_ARN: {{ required "aws.baseRoleArn is required" .Values.aws.baseRoleArn | quote }}
  ADMIN_EMAIL: {{ required "app.adminEmail is required" .Values.app.adminEmail | quote }}
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_USER: {{ .Values.smtp.user | quote }}
  SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  SMTP_FROM: {{ .Values.smtp.from | quote }}
  POSTGRES_HOST: {{ include "infrawatch.pgHost" . | quote }}
  POSTGRES_PORT: {{ include "infrawatch.pgPort" . | quote }}
  POSTGRES_DB: {{ include "infrawatch.pgDatabase" . | quote }}
  POSTGRES_USER: {{ include "infrawatch.pgUser" . | quote }}
  {{- if .Values.services.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password is required" .Values.services.postgresql.auth.password | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ required "externalServices.postgresql.password is required when services.postgresql.enabled=false" .Values.externalServices.postgresql.password | quote }}
  {{- end }}
  VALKEY_URL: {{ include "infrawatch.valkeyUrl" . | trim | quote }}
  {{- if and .Values.services.valkey.enabled .Values.services.valkey.password }}
  VALKEY_PASSWORD: {{ .Values.services.valkey.password | quote }}
  {{- end }}
  COOKIE_SECURE: {{ .Values.app.cookieSecure | quote }}
  {{- if .Values.app.corsOrigins }}
  CORS_ORIGINS: {{ .Values.app.corsOrigins | quote }}
  {{- end }}
  OTP_EXPIRY_MINUTES: {{ .Values.app.otpExpiryMinutes | quote }}
  OTP_MAX_ATTEMPTS: {{ .Values.app.otpMaxAttempts | quote }}
  {{- if .Values.app.allowedDomains }}
  ALLOWED_DOMAINS: {{ .Values.app.allowedDomains | quote }}
  {{- end }}
  {{- if .Values.app.collectorRegions }}
  COLLECTOR_REGIONS: {{ .Values.app.collectorRegions | quote }}
  {{- end }}
{{- end }}
