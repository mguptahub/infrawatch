{{- if .Values.services.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infrawatch.fullname" . }}-postgres
  labels:
    {{- include "infrawatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "infrawatch.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "infrawatch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.services.postgresql.image.repository }}:{{ .Values.services.postgresql.image.tag }}"
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.services.postgresql.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.services.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.services.postgresql.auth.password | quote }}
          {{- if .Values.services.postgresql.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.services.postgresql.auth.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.services.postgresql.resources | nindent 12 }}
      {{- if .Values.services.postgresql.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "infrawatch.fullname" . }}-postgres
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "infrawatch.fullname" . }}-postgres
  labels:
    {{- include "infrawatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "infrawatch.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- if .Values.services.postgresql.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "infrawatch.fullname" . }}-postgres
  labels:
    {{- include "infrawatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.services.postgresql.persistence.storageClass }}
  storageClassName: {{ .Values.services.postgresql.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.services.postgresql.persistence.size }}
{{- end }}
{{- end }}
