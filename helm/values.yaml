# InfraWatch Helm values

# -- Backend
backend:
  image:
    repository: mguptahub/infrawatch-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Frontend
frontend:
  image:
    repository: mguptahub/infrawatch-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Celery worker
celeryWorker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Celery beat (single replica always)
celeryBeat:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- PostgreSQL
# Set postgresql.enabled=false to use an external database
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: awsdashboard
    username: awsdashboard
    # password is required — set via --set or secrets
    password: ""
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- External PostgreSQL (used when postgresql.enabled=false)
externalPostgresql:
  host: ""
  port: 5432
  database: awsdashboard
  username: awsdashboard
  # password — set via --set or existing secret
  password: ""
  # Use an existing secret instead of plain password
  # existingSecret: ""
  # existingSecretKey: "password"

# -- Valkey (Redis-compatible cache & session store)
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8-alpine"
  password: ""
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- External Valkey/Redis (used when valkey.enabled=false)
externalValkey:
  url: ""

# -- AWS credentials (server-side only, never exposed to users)
aws:
  powerAccessKeyId: ""
  powerSecretAccessKey: ""
  region: us-east-1
  baseRoleArn: ""
  # Use an existing secret for AWS credentials
  # existingSecret: ""

# -- SMTP for OTP and notification emails
smtp:
  host: ""
  port: 587
  user: ""
  password: ""
  from: ""

# -- Application config
app:
  adminEmail: ""
  cookieSecure: true
  corsOrigins: ""
  otpExpiryMinutes: 10
  otpMaxAttempts: 5
  # Comma-separated domain whitelist for auto-registration (optional)
  allowedDomains: ""
  # Comma-separated region list to limit collection (optional, empty = all)
  collectorRegions: ""

# -- Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: infrawatch.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -- Service
service:
  type: ClusterIP
  frontendPort: 80
  backendPort: 8000

# -- Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
