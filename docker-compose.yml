name: infrawatch

services:
  postgres:
    image: postgres:16-alpine
    container_name: infrawatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-awsdashboard}
      POSTGRES_USER: ${POSTGRES_USER:-awsdashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-awsdashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    container_name: infrawatch-valkey
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD:?VALKEY_PASSWORD is required}"]
    networks:
      - monitor-net

  backend:
    build:
      context: ./backend
    container_name: infrawatch-backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - monitor-net

  celery_worker:
    build:
      context: ./backend
    container_name: infrawatch-celery-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - PYTHONUNBUFFERED=1
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - monitor-net

  celery_beat:
    build:
      context: ./backend
    container_name: infrawatch-celery-beat
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - monitor-net

  frontend:
    build:
      context: ./frontend
    container_name: infrawatch-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  postgres_data:
